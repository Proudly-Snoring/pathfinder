# nginx Configuration File
# http://wiki.nginx.org/Configuration
# Rendered at container start by entrypoint.sh: `envsubst '$PATHFINDER_SOCKET_HOST'`.

user nobody nobody;

worker_processes 4;
worker_rlimit_nofile 20000;

events {
  worker_connections            19000;
  multi_accept                  on;
  use                           epoll;
}

error_log  /var/lib/nginx/error.log warn;
pid        /var/run/nginx.pid;


http {

  server_tokens on;

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  charset_types text/css text/plain text/vnd.wap.wml application/javascript application/json application/rss+xml application/xml;

  sendfile        on;
  tcp_nopush      off;
  tcp_nodelay     on;

  # Timeouts ==================================================================
  client_body_timeout 12;
  client_header_timeout 12;
  keepalive_timeout 20s;
  send_timeout 10s;
  resolver_timeout 5s;
  fastcgi_connect_timeout 5s;
  fastcgi_read_timeout 40s;
  fastcgi_send_timeout  15s;

  # Buffer ====================================================================
  client_header_buffer_size 1k;
  large_client_header_buffers 4 4k;
  client_max_body_size 8m;
  client_body_buffer_size 1M;

  output_buffers                        2 32k;

  fastcgi_buffering                     on;
  fastcgi_buffers                       8 32k;
  fastcgi_buffer_size                   32k;

  # Caching ===================================================================
  open_file_cache                       max=10000 inactive=5m;
  open_file_cache_valid                 2m;
  open_file_cache_min_uses              1;
  open_file_cache_errors                on;

  # Logging ===================================================================
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

  log_format  main_ext  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '"$host" sn="$server_name" '
                      'rt=$request_time '
                      'ua="$upstream_addr" us="$upstream_status" '
                      'ut="$upstream_response_time" ul="$upstream_response_length" '
                      'cs=$upstream_cache_status' ;

  map $status $loggable {
    ~^[23]  0;
    default 1;
  }

  map $status $log_production {
    ~^[1234]  0;
    default 1;
  }

  map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
 }

 upstream websocket {
  server ${PATHFINDER_SOCKET_HOST}:8020;
 }


  access_log /var/log/nginx/access.log main if=$loggable;

  # Compression ===============================================================
  gzip on;
  gzip_comp_level    5;
  gzip_min_length    256;
  gzip_proxied       any;
  gzip_vary          on;
  gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

  gzip_static off;

  proxy_buffers 16 16k;
  proxy_buffer_size 16k;

  include /etc/nginx/sites_enabled/*.conf;
}
