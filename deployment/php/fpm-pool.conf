[global]
; Log to stderr
error_log = /dev/stderr

[www]
user = nobody
group = nobody
; Listen on TCP :9000 (matches nginx fastcgi_pass in site.conf)
listen = 127.0.0.1:9000
; Enable status page
pm.status_path = /fpm-status
; Health-check endpoint (curled by the base image's Docker HEALTHCHECK)
ping.path = /fpm-ping
ping.response = pong

; Ondemand process manager
pm = ondemand

pm.max_children = 50
pm.process_idle_timeout = 10s;
pm.max_requests = 500

; Make sure the FPM workers can reach the environment variables for configuration
clear_env = no

; Catch output from PHP
catch_workers_output = yes
